<script>
// ==================== CORRECTED SCRIPT (April 2026) ====================
const BACKEND_URL = "https://mahassni-bot.onrender.com";

let msgs = [];
let typing = false;
let rec = {name:'', org:'', contact:'', juris:'', lang:'', area:'', sum:'', urg:'unknown', dates:'', parties:''};
let transcript = [];

function init(){
  addBot("Good day. I am the intake assistant for The International Law Firm of Hassan Mahassni.\n\nHow may I assist you today?",
    ['Corporate & M&A','Banking & Finance','Dispute Resolution','Project Finance','Real Estate','Other matter']);
}

function addBot(txt, chips = []){
  const c = document.getElementById('chat-body');
  const d = document.createElement('div'); d.className = 'msg b';
  d.innerHTML = `<div class="av">M</div><div><div class="bubble">${txt.replace(/\n/g,'<br>')}</div>${chips.length ? `<div class="chips">${chips.map(x => `<span class="chip" onclick="pick('${x}')">${x}</span>`).join('')}</div>` : ''}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  transcript.push('Assistant: ' + txt);
}

function addUser(txt){
  const c = document.getElementById('chat-body');
  const d = document.createElement('div'); d.className = 'msg u';
  d.innerHTML = `<div><div class="bubble">${txt}</div></div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  transcript.push('Client: ' + txt);
}

function showTyping(){
  const c = document.getElementById('chat-body');
  const d = document.createElement('div'); d.className = 'msg b'; d.id = 'tind';
  d.innerHTML = '<div class="av">M</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function rmTyping(){ const t = document.getElementById('tind'); if(t) t.remove(); }

function pick(txt){ document.querySelectorAll('.chip').forEach(c => c.style.pointerEvents='none'); process(txt); }
function inject(txt){ document.getElementById('ti').value = txt; send(); }

function send(){
  const el = document.getElementById('ti');
  const t = el.value.trim();
  if(!t || typing) return;
  el.value = ''; el.style.height = 'auto';
  process(t);
}

async function process(txt){
  addUser(txt);
  msgs.push({role: 'user', content: txt});
  await callAPI();
}

async function callAPI(){
  typing = true;
  document.getElementById('sb').disabled = true;
  showTyping();

  try {
    const r = await fetch(`${BACKEND_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });

    const data = await r.json();

    if (data.error) throw new Error(data.error || "Server error");

    let reply = data.reply || "I apologise — please try again.";

    // Extract intake data
    const m = reply.match(/\|\|\|INTAKE\|\|\|(\{.*?\})\|\|\|END\|\|\|/s);
    if (m) {
      try {
        const p = JSON.parse(m[1]);
        Object.keys(p).forEach(k => {
          if (p[k] && p[k] !== '...' && String(p[k]).trim() && k !== 'complete') {
            rec[k] = p[k];
          }
        });
        updateRec();
      } catch(e) {}
      reply = reply.replace(/\|\|\|INTAKE\|\|\|.*?\|\|\|END\|\|\|/s, '').trim();
    }

    msgs.push({role: 'assistant', content: reply});
    rmTyping();
    addBot(reply);

    const badge = document.getElementById('rec-badge');
    badge.classList.add('live');
    badge.textContent = 'Updated';
    setTimeout(() => {
      badge.classList.remove('live');
      badge.textContent = 'Recording';
    }, 1800);

  } catch(e) {
    rmTyping();
    addBot("Connection issue — please try again later.");
    console.error("Chat error:", e);
  }

  typing = false;
  document.getElementById('sb').disabled = false;
}

function updateRec(){
  const map = {name:'rf-name',org:'rf-org',contact:'rf-contact',juris:'rf-juris',lang:'rf-lang',
               area:'rf-area',sum:'rf-sum',dates:'rf-dates',parties:'rf-parties'};
  Object.entries(map).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el && rec[k] && rec[k] !== '...') {
      el.textContent = rec[k];
      el.classList.remove('empty');
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 700);
    }
  });

  const urgEl = document.getElementById('rf-urg');
  if (urgEl) {
    if (rec.urg === 'high') urgEl.innerHTML = '<span class="urg-h">High — priority follow-up</span>';
    else if (rec.urg === 'normal') urgEl.innerHTML = '<span class="urg-n">Normal</span>';
    else urgEl.innerHTML = '<span class="urg-u">Not assessed</span>';
  }
}

async function genMemo(){
  const btn = document.getElementById('memo-btn');
  if(!msgs.length){ alert('Please have a conversation first.'); return; }

  btn.disabled = true;
  btn.textContent = 'Generating memorandum…';

  try {
    const r = await fetch(`${BACKEND_URL}/generate-doc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript: transcript.join('\n'), intake: rec })
    });

    const d = await r.json();
    document.getElementById('memo-out').textContent = d.document || d.error || 'Generation failed.';
    document.getElementById('memo-area').style.display = 'block';
    btn.textContent = 'Memorandum generated';
    btn.classList.add('done');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Generate intake memorandum';
    alert('Failed to generate memo. Please try again.');
    console.error(e);
  }
}

function cpMemo(){
  const text = document.getElementById('memo-out').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = original, 2000);
  });
}

function hk(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); } }
function ar(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

init();
</script>
